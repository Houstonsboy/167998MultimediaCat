<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Save Our Wildlife</h1>

    <section class="video-section" aria-label="Wildlife video">
      <video id="wildlife-video" controls>
        <source src="wildlife.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>

      <p class="description">
        Every species plays a vital role in our ecosystem. Join us in protecting
        endangered wildlife and preserving the natural habitats that all living
        things depend on. Together, we can make a difference.
      </p>

      <button id="toggle-btn" aria-controls="wildlife-video">
        Hide Video
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
